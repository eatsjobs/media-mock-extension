name: Release Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.package-version.outputs.version }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          publish: npm run changeset:publish
          title: "Release: Version Packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build Chrome and Firefox extensions (if published)
        if: steps.changesets.outputs.published == 'true'
        run: |
          npm run type-check
          npm run build
          npm run build:firefox
          
      - name: Get package version
        if: steps.changesets.outputs.published == 'true'
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Update VersionInfo component
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          sed -i "s/const EXTENSION_VERSION = '[0-9.]*'/const EXTENSION_VERSION = '$VERSION'/" entrypoints/popup/components/VersionInfo.tsx
          
      - name: Create Chrome and Firefox archives
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          cd .output
          # Chrome
          if [ -d "chrome-mv3" ]; then
            cd chrome-mv3
            zip -r "../../media-mock-extension-chrome-v${VERSION}.zip" .
            cd ..
          fi
          # Firefox
          if [ -d "firefox-mv2" ]; then
            cd firefox-mv2
            zip -r "../../media-mock-extension-firefox-v${VERSION}.zip" .
            cd ..
          fi
          cd ..
          
      - name: Upload Linux artifacts
        if: steps.changesets.outputs.published == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            media-mock-extension-chrome-v${{ steps.package-version.outputs.version }}.zip
            media-mock-extension-firefox-v${{ steps.package-version.outputs.version }}.zip
          
      - name: Commit updated VersionInfo
        if: steps.changesets.outputs.published == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add entrypoints/popup/components/VersionInfo.tsx
          git diff --staged --quiet || git commit -m "chore: update extension version to ${{ steps.package-version.outputs.version }}"
          git push

  build-safari:
    name: Build Safari Extension
    runs-on: macos-latest
    needs: release
    if: needs.release.outputs.published == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Safari extension
        run: npm run build:safari
        
      - name: Create Safari archive
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          cd .output/safari
          zip -r "../../media-mock-extension-safari-v${VERSION}.zip" .
          cd ../..
          
      - name: Upload Safari artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari-build
          path: media-mock-extension-safari-v${{ needs.release.outputs.version }}.zip

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release, build-safari]
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: write
    
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          
      - name: Download Safari artifact
        uses: actions/download-artifact@v4
        with:
          name: safari-build
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          name: MediaMock Extension v${{ needs.release.outputs.version }}
          body: |
            ## MediaMock Extension v${{ needs.release.outputs.version }}
            
            ### Browser Support
            - ✅ Chrome/Chromium (Manifest V3)
            - ✅ Firefox (Manifest V2)
            - ✅ Safari (WebExtensions)
            
            ### Installation
            1. Download the appropriate zip file for your browser
            2. Extract the contents
            3. Load as unpacked extension in your browser's developer mode
            
            ### Features
            - Mock camera devices for testing
            - Multiple device presets (iPhone, Samsung, Mac Desktop)
            - File upload support for custom media
            - Debug mode for development
            - Automatic device detection
            - Dark/Light theme support
            
            ### Changes
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for detailed changes.
          files: |
            media-mock-extension-chrome-v${{ needs.release.outputs.version }}.zip
            media-mock-extension-firefox-v${{ needs.release.outputs.version }}.zip
            media-mock-extension-safari-v${{ needs.release.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}