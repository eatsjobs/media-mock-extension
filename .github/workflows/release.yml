name: Release Extension

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.changesets.outputs.version }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
      - name: Process changesets and version
        id: changesets
        run: |
          # Check if there are changesets
          if [ -n "$(ls .changeset/*.md 2>/dev/null | grep -v README)" ]; then
            echo "Processing changesets..."
            npm run changeset:version
            
            # Get the new version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "New version: $NEW_VERSION"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "published=true" >> $GITHUB_OUTPUT
            
            # Update VersionInfo component
            sed -i "s/const EXTENSION_VERSION = '[0-9.]*'/const EXTENSION_VERSION = '$NEW_VERSION'/" entrypoints/popup/components/VersionInfo.tsx
            
            # Commit the version changes
            git add .
            git commit -m "chore: release version $NEW_VERSION" || echo "Nothing to commit"
            
            # Create and push tag
            git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
            git push origin main
            git push origin "v$NEW_VERSION"
          else
            echo "No changesets found to process"
            echo "published=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Run type check
        if: steps.changesets.outputs.published == 'true'
        run: npm run type-check
        
      - name: Build Chrome and Firefox extensions
        if: steps.changesets.outputs.published == 'true'
        run: |
          npm run build
          npm run build:firefox
          
      - name: Create Chrome and Firefox archives
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION="${{ steps.changesets.outputs.version }}"
          cd .output
          # Chrome
          if [ -d "chrome-mv3" ]; then
            cd chrome-mv3
            zip -r "../../@eatsjobs-media-mock-browser-extension-chrome-v${VERSION}.zip" .
            cd ..
          fi
          # Firefox
          if [ -d "firefox-mv2" ]; then
            cd firefox-mv2
            zip -r "../../@eatsjobs-media-mock-browser-extension-firefox-v${VERSION}.zip" .
            cd ..
          fi
          cd ..
          
      - name: Upload Linux artifacts
        if: steps.changesets.outputs.published == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            @eatsjobs-media-mock-browser-extension-chrome-v${{ steps.changesets.outputs.version }}.zip
            @eatsjobs-media-mock-browser-extension-firefox-v${{ steps.changesets.outputs.version }}.zip

  build-safari:
    name: Build Safari Extension
    runs-on: macos-latest
    needs: release
    if: needs.release.outputs.published == 'true'
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Safari extension
        run: |
          echo "Starting Safari build..."
          npm run build:safari
          echo "Safari build completed"
          
      - name: Verify Safari build
        run: |
          if [ ! -d ".output/safari" ]; then
            echo "❌ Safari build directory not found"
            exit 1
          fi
          echo "✅ Safari build directory found"
        
      - name: Create Safari archive
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          cd .output/safari
          zip -r "../../@eatsjobs-media-mock-browser-extension-safari-v${VERSION}.zip" .
          cd ../..
          
      - name: Upload Safari artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari-build
          path: "@eatsjobs-media-mock-browser-extension-safari-v${{ needs.release.outputs.version }}.zip"

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release, build-safari]
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: write
    
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          
      - name: Download Safari artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: safari-build
          
      - name: List available files
        run: |
          echo "Available files for release:"
          ls -la *.zip || echo "No zip files found"
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          name: MediaMock Extension v${{ needs.release.outputs.version }}
          body: |
            ## MediaMock Extension v${{ needs.release.outputs.version }}
            
            ### Browser Support
            - ✅ Chrome/Chromium (Manifest V3)
            - ✅ Firefox (Manifest V2)
            - ✅ Safari (WebExtensions) - *Build may be unavailable if macOS runner failed*
            
            ### Installation
            1. Download the appropriate zip file for your browser
            2. Extract the contents
            3. Load as unpacked extension in your browser's developer mode
            
            ### Features
            - Mock camera devices for testing
            - Multiple device presets (iPhone, Samsung, Mac Desktop)
            - File upload support for custom media
            - Debug mode for development
            - Automatic device detection
            - Dark/Light theme support
            
            ### Changes
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for detailed changes.
          files: |
            *.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}